name: Validate

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # checkout the PR branch so push goes back to it
          ref: ${{ github.head_ref }}

      - uses: dart-lang/setup-dart@v1
      - uses: flutter-actions/setup-flutter@v4

      - name: Install dependencies
        run: dart pub get

      - name: Fix analysis issues
        run: dart fix --apply

      - name: Generate built_value files
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Commit generated files
        id: commit_generated
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.email "bot@moosyl.com"
          git config user.name "Moosyl Bot"
          git add -A
          if git diff --staged --quiet; then
            echo "No generated changes"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: regenerate built_value files"
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish - dry run
        run: dart pub publish --dry-run

      - name: Push generated commit
        if: github.event.pull_request.head.repo.full_name == github.repository && steps.commit_generated.outputs.committed == 'true'
        run: git push
